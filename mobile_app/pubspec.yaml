name: dr_screening_app
description: Diabetic Retinopathy Screening Mobile App - Offline AI-powered DR detection
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  
  # State Management
  provider: ^6.0.5
  flutter_bloc: ^8.1.3
  
  # Image Handling
  image_picker: ^1.0.4
  image: ^4.1.3
  cached_network_image: ^3.3.0
  
  # ONNX Runtime for Mobile AI Inference
  onnxruntime: ^1.3.0
  
  # Camera
  camera: ^0.10.5+5
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  
  # PDF & Reports
  pdf: ^3.10.7
  printing: ^5.11.0
  
  # Networking (for optional cloud sync)
  http: ^1.1.0
  dio: ^5.4.0
  
  # Utilities
  intl: ^0.18.1
  path: ^1.8.3
  uuid: ^4.2.1
  permission_handler: ^11.1.0
  
  # Charts & Visualization
  fl_chart: ^0.65.0
  
  # Localization
  flutter_localizations:
    sdk: intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
